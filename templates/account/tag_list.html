{%  extends 'main.html' %}

{% block content %}

		<br>

		<div class="row">
			<div class="col-md">
				<div class="card card-body">
					<h5>Tag List</h5>
		<a class="btn btn-outline-secondary btn-sm btn-block text-dark " href="{% url 'import_csv' %}">Import Tag</a>
				</div>
				<div class="card card-body">
					<table class="table">
						<tr>
							<th>Name</th>
							
						</tr>

						{% for i in tag %}
							<tr>
								<td>{{i.name}}</td>
								
                               
							</tr>
						{% endfor %}

					</table>
				</div>
			</div>

		</div>

{% endblock content %}
